<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テスト - Starlist</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">
    <header class="bg-white shadow-sm p-4">
        <h1 class="text-xl font-bold text-center">俳優カテゴリテスト</h1>
    </header>
    
    <main class="container mx-auto p-4">
        <section class="mb-6">
            <h2 class="text-lg font-bold mb-3">俳優</h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-white p-3 rounded-lg shadow flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full bg-blue-500 flex items-center justify-center text-white mb-2">
                        <i class="fas fa-user-tie text-2xl"></i>
                    </div>
                    <h3 class="font-medium text-sm">俳優 A</h3>
                    <p class="text-xs text-gray-500 mb-2">実力派</p>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded-full text-xs w-full">フォロー</button>
                </div>
                
                <div class="bg-white p-3 rounded-lg shadow flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full bg-purple-500 flex items-center justify-center text-white mb-2">
                        <i class="fas fa-theater-masks text-2xl"></i>
                    </div>
                    <h3 class="font-medium text-sm">俳優 B</h3>
                    <p class="text-xs text-gray-500 mb-2">舞台俳優</p>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded-full text-xs w-full">フォロー</button>
                </div>
                
                <div class="bg-white p-3 rounded-lg shadow flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full bg-pink-500 flex items-center justify-center text-white mb-2">
                        <i class="fas fa-female text-2xl"></i>
                    </div>
                    <h3 class="font-medium text-sm">女優 C</h3>
                    <p class="text-xs text-gray-500 mb-2">映画主演</p>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded-full text-xs w-full">フォロー</button>
                </div>
                
                <div class="bg-white p-3 rounded-lg shadow flex flex-col items-center">
                    <div class="w-16 h-16 rounded-full bg-indigo-500 flex items-center justify-center text-white mb-2">
                        <i class="fas fa-film text-2xl"></i>
                    </div>
                    <h3 class="font-medium text-sm">女優 D</h3>
                    <p class="text-xs text-gray-500 mb-2">ドラマ中心</p>
                    <button class="bg-blue-500 text-white px-3 py-1 rounded-full text-xs w-full">フォロー</button>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
